  - from: orchestrator_pm
    to: platform_pm
    relation: routes_when_matched
  - from: orchestrator_pm
    to: ops_pm
    relation: routes_when_matched
  - from: router_pm
    to: domain_pm
    relation: routes_when_scale_mode
  - from: router_pm
    to: platform_pm
    relation: routes_when_scale_mode
