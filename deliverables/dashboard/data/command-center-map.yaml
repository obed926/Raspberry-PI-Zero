    to: ops_pm
    relation: routes_when_scale_mode
  - from: domain_pm
    to: worker_exec
    relation: delegates_execution
  - from: platform_pm
    to: worker_exec
    relation: delegates_execution
  - from: worker_exec
    to: qa
