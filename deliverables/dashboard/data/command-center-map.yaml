  root_node: ceo_human
  lanes:
    - lane_id: leadership
      label: Leadership
    - lane_id: orchestration
      label: Orchestration
    - lane_id: team_pm
      label: Team PMs
    - lane_id: quality
      label: Quality Gates
    - lane_id: execution
      label: Execution

